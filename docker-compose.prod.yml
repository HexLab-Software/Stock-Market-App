services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-market-app-prod
    restart: always
    working_dir: /var/www
    env_file:
      - .env.production
    networks:
      - app-network

  web:
    image: nginx:alpine
    container_name: stock-market-web-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  # Dedicated container for the scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-market-scheduler-prod
    restart: always
    working_dir: /var/www
    env_file:
      - .env.production
    command: ["php", "artisan", "schedule:work", "--queue=email"]
    networks:
      - app-network
    depends_on:
      - app

  # Worker for the Telegram bot / jobs
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-market-worker-prod
    restart: always
    working_dir: /var/www
    env_file:
      - .env.production
    command: ["php", "artisan", "queue:work", "--queue=email,default"]
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    driver: bridge
