services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-market-app-staging
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file:
      - .env.staging
    networks:
      - app-network

  web:
    image: nginx:alpine
    container_name: stock-market-web-staging
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  # Dedicated container for the scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-market-scheduler-staging
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file:
      - .env.staging
    command: ["php", "artisan", "schedule:work"]
    networks:
      - app-network
    depends_on:
      - app

  # Worker for the Telegram bot / jobs
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-market-worker-staging
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file:
      - .env.staging
    command: ["php", "artisan", "queue:work", "--queue=email"]
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    driver: bridge
